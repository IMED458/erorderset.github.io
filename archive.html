<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ER ორდერ-სეტი — არქივი</title>
  <link rel="icon" type="image/png" href="./erchecklist.png"/>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      params.set("view", "archive");
      var query = params.toString();
      window.location.replace("./index.html" + (query ? "?" + query : ""));
    })();
  </script>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f8fafc;
      color:#111827;
      font-family:Calibri,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    .card{
      width:min(560px, calc(100vw - 32px));
      background:#ffffff;
      border:1px solid rgba(0,0,0,.12);
      border-radius:18px;
      padding:24px;
      box-shadow:0 12px 30px rgba(15,23,42,.08);
    }
    h1{margin:0 0 8px 0; font-size:22px}
    p{margin:0 0 14px 0; color:#6b7280; line-height:1.45}
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.12);
      text-decoration:none;
      color:#111827;
      background:#ffffff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>არქივი იტვირთება</h1>
    <p>თუ გვერდი ავტომატურად არ გაიხსნა, ქვემოთ დააჭირე ხელით.</p>
    <a id="archiveFallback" href="./index.html?view=archive">არქივის გახსნა</a>
  </div>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      params.set("view", "archive");
      var query = params.toString();
      var target = "./index.html" + (query ? "?" + query : "");
      var link = document.getElementById("archiveFallback");
      if(link) link.href = target;
    })();
  </script>
</body>
</html>
